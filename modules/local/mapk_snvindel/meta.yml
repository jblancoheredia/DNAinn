name: mapk_snvindel
description: Intersect SNV/InDel variant calls with a restricted MAPK gene set and summarize per sample/gene.
keywords:
  - mapk
  - snv
  - indel
  - variants
  - dnaseq
tools:
  - mapk_snvindel:
      description: Lightweight Python script for MAPK-focused SNV/InDel summarization.
      homepage: NA
      documentation: NA
      tool_dev_url: NA
      doi: ""
      licence: ["MIT"]
input:
  - meta:
      type: map
      description: Groovy Map containing sample information, e.g. [ id:'sample1' ]
  - variants_tsv:
      type: file
      description: TSV containing SNV/InDel calls with at least a gene-symbol column.
      pattern: "*.tsv"
  - mapk_genes_tsv:
      type: file
      description: TSV containing the restricted MAPK gene set. Must include gene_symbol or gene column.
      pattern: "*.tsv"
output:
  - alterations:
      type: file
      description: MAPK-filtered SNV/InDel alterations table.
      pattern: "*.mapk_snvindel.alterations.tsv"
  - sample_summary:
      type: file
      description: Per-sample MAPK SNV/InDel summary.
      pattern: "*.mapk_snvindel.sample_summary.tsv"
  - gene_summary:
      type: file
      description: Per-sample, per-gene MAPK SNV/InDel event summary.
      pattern: "*.mapk_snvindel.gene_summary.tsv"
  - versions:
      type: file
      description: File containing software versions.
      pattern: "versions.yml"
authors:
  - "MSKCC CMO"
